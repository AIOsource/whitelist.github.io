<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora VPN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 440px;
      width: 100%;
      background: #121218;
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid #1e1e2e;
    }
    .header { text-align: center; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #fff; margin-bottom: 4px; }
    .sub { color: #888; font-size: 12px; }
    .servers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .srv {
      background: #1a1a24;
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #252535;
      text-align: center;
    }
    .srv .flag { font-size: 22px; margin-bottom: 4px; }
    .srv .name { font-size: 11px; color: #fff; font-weight: 500; margin-bottom: 2px; }
    .srv .detail { font-size: 10px; color: #666; }
    .info {
      background: #0d2818;
      border: 1px solid #1a4d2e;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #3fb950;
      text-align: center;
    }
    .url-box {
      background: #1a1a24;
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #252535;
      margin-bottom: 16px;
    }
    .url-box .label { font-size: 11px; color: #666; margin-bottom: 8px; }
    .url-input { display: flex; gap: 8px; }
    .url-input input {
      flex: 1;
      background: #0a0a0f;
      border: 1px solid #252535;
      border-radius: 8px;
      padding: 10px 12px;
      color: #aaa;
      font-size: 11px;
      font-family: monospace;
      outline: none;
      min-width: 0;
    }
    .btn {
      background: #3fb950;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn.copied { background: #238636; color: #fff; }
    .steps {
      background: #1a1a24;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #252535;
      margin-bottom: 16px;
    }
    .steps div { font-size: 13px; color: #999; line-height: 1.6; }
    .steps strong { color: #ccc; }
    .footer { text-align: center; font-size: 11px; color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Aurora VPN</h1>
      <div class="sub">4 сервера &bull; VLESS Reality &bull; 3GB</div>
    </div>

    <div class="info">
      Только для белых списков &bull; Лимит 3 GB
    </div>

    <div class="servers">
      <div class="srv">
        <div class="flag">🇪🇺</div>
        <div class="name">Белые #1</div>
        <div class="detail">3 GB &bull; 8443</div>
      </div>
      <div class="srv">
        <div class="flag">🇪🇺</div>
        <div class="name">Белые #2</div>
        <div class="detail">3 GB &bull; 443</div>
      </div>
      <div class="srv">
        <div class="flag">🇮🇹</div>
        <div class="name">Италия</div>
        <div class="detail">443</div>
      </div>
      <div class="srv">
        <div class="flag">🇳🇱</div>
        <div class="name">Нидерланды</div>
        <div class="detail">443</div>
      </div>
    </div>

    <div class="url-box">
      <div class="label">Ссылка для Happ / Hiddify:</div>
      <div class="url-input">
        <input type="text" id="sub-url" readonly>
        <button class="btn" id="copy-btn" onclick="copyUrl()">Copy</button>
      </div>
    </div>

    <div class="steps">
      <div><strong>1.</strong> Скопируйте ссылку</div>
      <div><strong>2.</strong> Откройте Happ / Hiddify</div>
      <div><strong>3.</strong> Добавьте подписку → вставьте</div>
    </div>

    <div class="footer">Aurora VPN</div>
  </div>

  <script>
    (function() {
      var u = window.location.origin + window.location.pathname;
      if (!u.endsWith("/")) u += "/";
      u += "sub.json";
      document.getElementById("sub-url").value = u;
      window.copyUrl = function() {
        var i = document.getElementById("sub-url");
        i.select();
        navigator.clipboard.writeText(u).then(function() {
          var b = document.getElementById("copy-btn");
          b.textContent = "Done";
          b.classList.add("copied");
          setTimeout(function() { b.textContent = "Copy"; b.classList.remove("copied"); }, 2000);
        });
      };
    })();
  </script>
</body>
</html>
